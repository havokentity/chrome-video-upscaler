<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mac Video Upscaler</title>
  </head>
  <body>
    <main class="panel">
      <header>
        <h1>Mac Video Upscaler</h1>
        <label class="switch">
          <input id="enabled" type="checkbox" />
          <span>Enabled</span>
        </label>
      </header>

      <label>
        Mode
        <select id="mode"></select>
      </label>

      <label>
        Scale
        <select id="scale"></select>
      </label>

      <label>
        FSR sharpness
        <input id="fsrSharpness" type="range" min="0" max="1" step="0.05" />
      </label>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
